<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scrolling Self</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg: #05050a;
  --fg: #e8e4dc;
  --muted: rgba(232,228,220,0.35);
  --accent: #e8e4dc;
  --font-display: 'Playfair Display', Georgia, serif;
  --font-mono: 'DM Mono', monospace;
  --font-body: 'Cormorant Garamond', Georgia, serif;
  --hue: 0;
  --sat: 0%;
  --theme-a: rgba(255,255,255,0.0);
  --theme-b: rgba(255,255,255,0.0);
}
html,body{width:100%;height:100%;overflow:hidden}
body{
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font-body);
  cursor: none;
  position: relative;
}

/* ── cursor ── */
#cur{position:fixed;width:8px;height:8px;border-radius:50%;background:var(--fg);pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:difference;transition:transform .1s}
#cur-ring{position:fixed;width:36px;height:36px;border:1px solid rgba(232,228,220,0.3);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:left .14s ease,top .14s ease}

/* ── canvas ── */
#cv{position:fixed;inset:0;width:100%;height:100%;z-index:0}

/* ── scanlines ── */
#scan{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 4px);pointer-events:none;z-index:50}

/* ── typed text echo layer ── */
#echo-layer{position:fixed;inset:0;pointer-events:none;z-index:10;overflow:hidden}
.echo-word{
  position:absolute;
  font-family: var(--font-display);
  font-style:italic;
  pointer-events:none;
  white-space:nowrap;
  animation: echo-fade 4s forwards ease-out;
  mix-blend-mode: screen;
}
@keyframes echo-fade{
  0%{opacity:0.9;transform:scale(0.95) translateY(0)}
  100%{opacity:0;transform:scale(1.25) translateY(-60px)}
}

/* ── UI shell ── */
#shell{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:20;
  pointer-events:none;
}

/* ── header ── */
#header{
  position:fixed;
  top:0;left:0;right:0;
  padding: 1.6rem 2.2rem;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  z-index:30;
  pointer-events:none;
}
.h-logo{
  font-family: var(--font-display);
  font-size: 13px;
  font-weight:400;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color: var(--muted);
}
.h-meta{
  font-family: var(--font-mono);
  font-size:10px;
  color: var(--muted);
  letter-spacing:0.12em;
  text-align:right;
  line-height:1.7;
}

/* ── center prompt ── */
#center{
  text-align:center;
  padding: 0 2rem;
  max-width: 640px;
  width:100%;
  pointer-events: all;
}

#eyebrow{
  font-family: var(--font-mono);
  font-size:10px;
  letter-spacing:0.3em;
  text-transform:uppercase;
  color: var(--muted);
  margin-bottom:2.5rem;
  transition: opacity 0.6s;
}

#question{
  font-family: var(--font-display);
  font-size: clamp(28px, 5vw, 54px);
  font-weight:400;
  font-style:italic;
  line-height:1.2;
  color: var(--fg);
  margin-bottom: 2.8rem;
  transition: opacity 0.8s, transform 0.8s;
}

/* ── input ── */
#input-wrap{
  position:relative;
  width:100%;
  max-width:520px;
  margin: 0 auto;
}

#the-input{
  width:100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(232,228,220,0.2);
  color: var(--fg);
  font-family: var(--font-body);
  font-size: clamp(18px, 2.8vw, 30px);
  font-style:italic;
  text-align:center;
  padding: 0.6rem 0.5rem 1rem;
  outline: none;
  caret-color: var(--fg);
  transition: border-color 0.4s;
  cursor:text;
}
#the-input::placeholder{
  color: rgba(232,228,220,0.2);
  font-style:italic;
}
#the-input:focus{ border-bottom-color: rgba(232,228,220,0.6); }

#input-line{
  position:absolute;
  bottom:0;left:50%;
  width:0;
  height:1px;
  background: var(--fg);
  transform:translateX(-50%);
  transition: width 0.5s ease;
}
#the-input:focus ~ #input-line{ width:60%; }

#hint{
  font-family: var(--font-mono);
  font-size:10px;
  color: var(--muted);
  letter-spacing:0.2em;
  margin-top:1.4rem;
  transition: opacity 0.5s;
}

/* ── state: active ── */
body.active #eyebrow{ opacity:0; }
body.active #question{ opacity:0.15; transform:translateY(-10px); }

/* ── theme label ── */
#theme-label{
  position:fixed;
  bottom: 2rem;
  left:50%;
  transform:translateX(-50%);
  font-family: var(--font-mono);
  font-size:11px;
  letter-spacing:0.25em;
  text-transform:uppercase;
  color: var(--muted);
  z-index:30;
  pointer-events:none;
  transition: opacity 0.5s;
  opacity:0;
  white-space:nowrap;
}

/* ── word history strip ── */
#word-strip{
  position:fixed;
  bottom: 4rem;
  left:0;right:0;
  display:flex;
  justify-content:center;
  gap:1.2rem;
  flex-wrap:wrap;
  padding:0 3rem;
  pointer-events:none;
  z-index:25;
}
.strip-word{
  font-family: var(--font-mono);
  font-size:10px;
  color: var(--muted);
  letter-spacing:0.15em;
  animation: strip-in 0.5s forwards ease-out;
  white-space:nowrap;
}
@keyframes strip-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<canvas id="cv"></canvas>
<div id="scan"></div>
<div id="echo-layer"></div>

<div id="cur"></div>
<div id="cur-ring"></div>

<div id="header">
  <div class="h-logo">Scrolling Self</div>
  <div class="h-meta" id="meta">After Laurel Schwulst<br>type to become</div>
</div>

<div id="shell">
  <div id="center">
    <div id="eyebrow">Who are you right now?</div>
    <div id="question">The site listens.<br>Type anything.</div>
    <div id="input-wrap">
      <input id="the-input" type="text" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="I am…" maxlength="120">
      <div id="input-line"></div>
    </div>
    <div id="hint">press enter to echo · keep typing to shift</div>
  </div>
</div>

<div id="theme-label"></div>
<div id="word-strip"></div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const input = document.getElementById('the-input');
const echoLayer = document.getElementById('echo-layer');
const themeLabel = document.getElementById('theme-label');
const wordStrip = document.getElementById('word-strip');
const meta = document.getElementById('meta');

let W, H;
function resize(){ W = cv.width = window.innerWidth; H = cv.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// ── cursor ──
const cur = document.getElementById('cur');
const ring = document.getElementById('cur-ring');
let mx=W/2,my=H/2,rx=W/2,ry=H/2;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
(function animCur(){
  cur.style.left=mx+'px';cur.style.top=my+'px';
  rx+=(mx-rx)*0.1;ry+=(my-ry)*0.1;
  ring.style.left=rx+'px';ring.style.top=ry+'px';
  requestAnimationFrame(animCur);
})();

// ── THEME ENGINE ──
const themes = {
  star:    { keywords:['star','cosmos','galax','cosm','universe','celestial','nebula','constellation','space','astro','infinite'], label:'stellar', r:()=>({h:220,s:60,bg:'#02040f',palette:['#7fb3f5','#c4a4f0','#f0d4a4','#ffffff','#4a7fd4']}) },
  lightning:{keywords:['lightning','thunder','electric','bolt','storm','energy','voltage','charge','spark','power','static'],      label:'electric', r:()=>({h:58,s:90,bg:'#040802',palette:['#e8ff00','#a0e800','#ffffff','#ffcc00','#00ff88']}) },
  water:   { keywords:['water','ocean','wave','flow','river','sea','rain','liquid','fluid','stream','drift','ripple'],              label:'aquatic', r:()=>({h:200,s:70,bg:'#010c14',palette:['#00b4d8','#48cae4','#90e0ef','#caf0f8','#0077b6']}) },
  magic:   { keywords:['magic','spell','mystic','ancient','enchant','witch','wizard','ritual','rune','potion','arcane','myth'],    label:'mystical', r:()=>({h:280,s:65,bg:'#07020f',palette:['#bf7fff','#ff6eb4','#7fffcf','#ffffaa','#c084fc']}) },
  circuit: { keywords:['circuit','code','digital','binary','tech','cyber','data','pixel','matrix','computer','algorithm','grid'],  label:'digital', r:()=>({h:140,s:80,bg:'#010804',palette:['#00ff88','#00cc66','#aaffcc','#004422','#00ffcc']}) },
  tree:    { keywords:['tree','root','branch','grow','forest','plant','leaf','nature','organic','earth','bloom','seed','wood'],    label:'organic', r:()=>({h:90,s:60,bg:'#020801',palette:['#6db33f','#96cc52','#c8e6a0','#3d6b1f','#f0f4a0']}) },
  fire:    { keywords:['fire','flame','burn','explosion','explode','blast','inferno','heat','lava','volcanic','eruption','burst'], label:'ignited', r:()=>({h:18,s:90,bg:'#0d0200',palette:['#ff6b35','#ff9f1c','#ffcc00','#ffffff','#ff3300']}) },
  cloud:   { keywords:['cloud','rain','mist','fog','sky','air','wind','weather','drizzle','storm','overcast','atmosphere'],       label:'atmospheric', r:()=>({h:210,s:20,bg:'#08090c',palette:['#9eb8d9','#c5d8ec','#e8f0f8','#6a8ab0','#d4e6f8']}) },
  spiral:  { keywords:['spiral','vortex','swirl','spin','rotate','whirl','tornado','twist','hypnot','dizzy','cyclone','loop'],    label:'vortical', r:()=>({h:300,s:50,bg:'#080210',palette:['#d080ff','#ff80e0','#80b0ff','#ffffff','#c040d0']}) },
  pulse:   { keywords:['pulse','throb','beat','heart','rhythm','vibrate','oscillate','frequency','wave','pulsing','alive'],       label:'pulsing', r:()=>({h:0,s:80,bg:'#0f0204',palette:['#ff4488','#ff88aa','#ff0055','#ffffff','#ff3366']}) },
  default: { keywords:[], label:'present', r:()=>({h:0,s:0,bg:'#05050a',palette:['#c8c4bc','#e8e4dc','#a0a090','#f8f4ec','#606050']}) }
};

let currentTheme = 'default';
let themeData = themes.default.r();
let particles = [];
let specialEffects = [];
let frameCount = 0;
let inputHistory = [];

function detectTheme(text) {
  const t = text.toLowerCase();
  for (const [key, theme] of Object.entries(themes)) {
    if (key === 'default') continue;
    if (theme.keywords.some(kw => t.includes(kw))) return key;
  }
  return 'default';
}

function setTheme(name) {
  if (name === currentTheme) return;
  currentTheme = name;
  themeData = themes[name].r();
  document.body.style.background = themeData.bg;
  themeLabel.textContent = '— ' + themes[name].label + ' —';
  themeLabel.style.opacity = '0.5';
  setTimeout(()=>themeLabel.style.opacity='0',2500);
  particles = [];
  specialEffects = [];
  spawnParticles(80 + Math.random()*60 | 0);
}

// ── PARTICLE SYSTEM ──
class Particle {
  constructor(type) {
    this.type = type;
    this.reset(true);
  }
  reset(init) {
    this.x = init ? Math.random()*W : (Math.random()*W*1.4 - W*0.2);
    this.y = init ? Math.random()*H : H + 20;
    this.baseX = this.x; this.baseY = this.y;
    this.vx = (Math.random()-0.5)*0.8;
    this.vy = -Math.random()*0.5-0.2;
    this.life = 0;
    this.maxLife = 200 + Math.random()*400 | 0;
    this.size = Math.random()*3+0.5;
    this.color = themeData.palette[Math.random()*themeData.palette.length|0];
    this.angle = Math.random()*Math.PI*2;
    this.spin = (Math.random()-0.5)*0.04;
    this.amplitude = Math.random()*30;
    this.freq = Math.random()*0.02+0.005;
    this.shape = ['circle','circle','circle','line','diamond'][Math.random()*5|0];
  }
  update() {
    this.life++;
    const progress = this.life/this.maxLife;
    // Theme-specific movement
    if (currentTheme==='spiral' || currentTheme==='vortex') {
      const cx=W/2,cy=H/2;
      const dx=this.x-cx,dy=this.y-cy;
      const dist=Math.sqrt(dx*dx+dy*dy);
      const angV=0.015;
      const ang=Math.atan2(dy,dx)+angV;
      const targetDist=dist*(0.998);
      this.x=cx+Math.cos(ang)*targetDist;
      this.y=cy+Math.sin(ang)*targetDist;
    } else if (currentTheme==='water' || currentTheme==='cloud') {
      this.x += this.vx + Math.sin(this.life*this.freq)*0.5;
      this.y += this.vy*0.3;
    } else if (currentTheme==='lightning' || currentTheme==='pulse') {
      this.x += this.vx + (Math.random()-0.5)*2;
      this.y += this.vy;
    } else if (currentTheme==='tree') {
      this.x += this.vx*0.3;
      this.y += this.vy*0.5;
    } else {
      this.x += this.vx + Math.sin(this.angle+this.life*this.freq)*this.amplitude*0.01;
      this.y += this.vy;
      this.angle+=this.spin;
    }
    if (this.life>=this.maxLife || this.y<-50 || this.x<-50 || this.x>W+50) this.reset(false);
  }
  draw() {
    const progress = this.life/this.maxLife;
    const alpha = progress<0.1 ? progress*10 : progress>0.85 ? (1-progress)/0.15 : 1;
    ctx.save();
    ctx.globalAlpha = alpha * 0.75;
    ctx.fillStyle = this.color;
    ctx.strokeStyle = this.color;
    const s = this.size;
    if (this.shape==='circle') {
      ctx.beginPath();ctx.arc(this.x,this.y,s,0,Math.PI*2);ctx.fill();
    } else if (this.shape==='diamond') {
      ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.angle);
      ctx.beginPath();ctx.moveTo(0,-s*1.5);ctx.lineTo(s,0);ctx.lineTo(0,s*1.5);ctx.lineTo(-s,0);ctx.closePath();ctx.fill();
      ctx.restore();
    } else {
      ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.angle);
      ctx.lineWidth=0.8;ctx.beginPath();ctx.moveTo(-s*2,0);ctx.lineTo(s*2,0);ctx.stroke();
      ctx.restore();
    }
    ctx.restore();
  }
}

function spawnParticles(n) {
  for(let i=0;i<n;i++) particles.push(new Particle(currentTheme));
}

// ── SPECIAL EFFECTS ──
class StarEffect {
  constructor(x,y){ this.x=x||Math.random()*W; this.y=y||Math.random()*H; this.r=0; this.maxR=Math.random()*2+0.5; this.twinkle=Math.random()*Math.PI*2; this.life=0; this.maxLife=300+Math.random()*500|0; this.color=themeData.palette[Math.random()*themeData.palette.length|0]; }
  update(){ this.life++; this.twinkle+=0.05; return this.life<this.maxLife; }
  draw(){ const a=(Math.sin(this.twinkle)*0.5+0.5)*(1-this.life/this.maxLife); ctx.globalAlpha=a*0.9; ctx.fillStyle=this.color; ctx.beginPath(); ctx.arc(this.x,this.y,this.maxR,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=a*0.3; ctx.arc(this.x,this.y,this.maxR*3,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1; }
}
class LightningBolt {
  constructor(){ this.x1=Math.random()*W; this.y1=0; this.segments=[]; this.life=0; this.maxLife=30; let x=this.x1,y=this.y1; while(y<H+50){const nx=x+(Math.random()-0.5)*80,ny=y+Math.random()*60+20; this.segments.push({x1:x,y1:y,x2:nx,y2:ny}); x=nx;y=ny;} this.color=themeData.palette[0]; }
  update(){ this.life++; return this.life<this.maxLife; }
  draw(){ const a=(1-this.life/this.maxLife); ctx.globalAlpha=a; ctx.strokeStyle=this.color; ctx.lineWidth=a*2+0.5; ctx.shadowColor=this.color; ctx.shadowBlur=10*a; ctx.beginPath(); this.segments.forEach((s,i)=>{ if(i===0)ctx.moveTo(s.x1,s.y1); ctx.lineTo(s.x2,s.y2); }); ctx.stroke(); ctx.shadowBlur=0; ctx.globalAlpha=1; }
}
class RippleEffect {
  constructor(x,y){ this.x=x||W/2; this.y=y||H/2; this.r=0; this.maxR=Math.max(W,H)*0.8; this.life=0; this.maxLife=120; this.color=themeData.palette[Math.random()*themeData.palette.length|0]; }
  update(){ this.life++; this.r=this.life/this.maxLife*this.maxR; return this.life<this.maxLife; }
  draw(){ const a=(1-this.life/this.maxLife)*0.5; ctx.globalAlpha=a; ctx.strokeStyle=this.color; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.stroke(); ctx.globalAlpha=1; }
}
class CircuitLine {
  constructor(){ this.x=Math.random()<0.5?-10:W+10; this.y=Math.random()*H; this.dir=this.x<0?1:-1; this.vx=this.dir*(Math.random()*3+1); this.vy=0; this.life=0; this.maxLife=180; this.corners=[]; this.curX=this.x; this.curY=this.y; this.color=themeData.palette[Math.random()*themeData.palette.length|0]; }
  update(){ this.life++; if(Math.random()<0.02&&this.corners.length<5){ this.corners.push({x:this.curX,y:this.curY}); this.vy=(Math.random()-0.5)*3; } this.curX+=this.vx; this.curY+=this.vy; return this.life<this.maxLife&&this.curX>-50&&this.curX<W+50; }
  draw(){ const a=(1-this.life/this.maxLife)*0.8; ctx.globalAlpha=a; ctx.strokeStyle=this.color; ctx.lineWidth=1; ctx.shadowColor=this.color; ctx.shadowBlur=4; ctx.beginPath(); ctx.moveTo(this.x,this.y); this.corners.forEach(c=>ctx.lineTo(c.x,c.y)); ctx.lineTo(this.curX,this.curY); ctx.stroke(); ctx.beginPath(); ctx.arc(this.curX,this.curY,2,0,Math.PI*2); ctx.fillStyle=this.color; ctx.fill(); ctx.shadowBlur=0; ctx.globalAlpha=1; }
}
class FractalBranch {
  constructor(x,y,angle,depth,len){ this.segs=[]; this.build(x,y,angle,depth,len); this.life=0; this.maxLife=200; this.color=themeData.palette[Math.random()*themeData.palette.length|0]; }
  build(x,y,a,d,l){ if(d<0)return; const nx=x+Math.cos(a)*l,ny=y+Math.sin(a)*l; this.segs.push({x1:x,y1:y,x2:nx,y2:ny,d}); const spread=0.4+Math.random()*0.2; this.build(nx,ny,a-spread,d-1,l*0.7); this.build(nx,ny,a+spread,d-1,l*0.7); }
  update(){ this.life++; return this.life<this.maxLife; }
  draw(){ const a=(1-this.life/this.maxLife)*0.7; this.segs.forEach(s=>{ ctx.globalAlpha=a*(s.d/5); ctx.strokeStyle=this.color; ctx.lineWidth=s.d*0.4+0.3; ctx.beginPath(); ctx.moveTo(s.x1,s.y1); ctx.lineTo(s.x2,s.y2); ctx.stroke(); }); ctx.globalAlpha=1; }
}
class ExplosionBurst {
  constructor(){ this.x=W/2; this.y=H/2; this.rings=[]; this.shards=[]; this.life=0; this.maxLife=90; for(let i=0;i<8;i++) this.rings.push({r:0,speed:Math.random()*8+4,color:themeData.palette[i%themeData.palette.length]}); for(let i=0;i<40;i++){ const a=Math.random()*Math.PI*2; this.shards.push({x:this.x,y:this.y,vx:Math.cos(a)*(Math.random()*12+3),vy:Math.sin(a)*(Math.random()*12+3),color:themeData.palette[i%themeData.palette.length]}); } }
  update(){ this.life++; this.rings.forEach(r=>r.r+=r.speed); this.shards.forEach(s=>{ s.x+=s.vx; s.y+=s.vy; s.vx*=0.95; s.vy*=0.95; }); return this.life<this.maxLife; }
  draw(){ const a=1-this.life/this.maxLife; this.rings.forEach(r=>{ ctx.globalAlpha=a*0.4; ctx.strokeStyle=r.color; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(this.x,this.y,r.r,0,Math.PI*2); ctx.stroke(); }); this.shards.forEach(s=>{ ctx.globalAlpha=a*0.9; ctx.fillStyle=s.color; ctx.beginPath(); ctx.arc(s.x,s.y,2,0,Math.PI*2); ctx.fill(); }); ctx.globalAlpha=1; }
}
class RainDrop {
  constructor(){ this.reset(); }
  reset(){ this.x=Math.random()*W; this.y=-20; this.speed=Math.random()*8+5; this.len=Math.random()*25+10; this.life=0; this.maxLife=Math.ceil((H+40)/this.speed); this.color=themeData.palette[Math.random()*themeData.palette.length|0]; }
  update(){ this.y+=this.speed; this.life++; return this.life<this.maxLife; }
  draw(){ const a=0.4+Math.random()*0.2; ctx.globalAlpha=a; ctx.strokeStyle=this.color; ctx.lineWidth=0.7; ctx.beginPath(); ctx.moveTo(this.x,this.y); ctx.lineTo(this.x-2,this.y-this.len); ctx.stroke(); ctx.globalAlpha=1; }
}
class SpiralEffect {
  constructor(){ this.angle=0; this.life=0; this.maxLife=300; this.color=themeData.palette[0]; this.speed=0.06; this.arms=3; }
  update(){ this.angle+=this.speed; this.life++; return this.life<this.maxLife; }
  draw(){
    const a=(1-this.life/this.maxLife);
    for(let arm=0;arm<this.arms;arm++){
      const offset=(arm/this.arms)*Math.PI*2;
      ctx.beginPath();
      for(let t=0;t<this.angle;t+=0.05){
        const r=t*18; const x=W/2+Math.cos(t+offset)*r; const y=H/2+Math.sin(t+offset)*r;
        if(r>Math.max(W,H)) break;
        if(t===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      }
      ctx.globalAlpha=a*0.35; ctx.strokeStyle=themeData.palette[arm%themeData.palette.length]; ctx.lineWidth=1.2; ctx.stroke();
    }
    ctx.globalAlpha=1;
  }
}
class PulseOrb {
  constructor(){ this.x=Math.random()*W; this.y=Math.random()*H; this.baseR=Math.random()*30+15; this.life=0; this.maxLife=200; this.phase=Math.random()*Math.PI*2; this.color=themeData.palette[Math.random()*themeData.palette.length|0]; }
  update(){ this.life++; return this.life<this.maxLife; }
  draw(){ const t=this.life/this.maxLife; const a=(t<0.2?t*5:t>0.8?(1-t)*5:1)*0.6; const r=this.baseR*(1+Math.sin(this.life*0.1+this.phase)*0.4); ctx.globalAlpha=a*0.3; ctx.fillStyle=this.color; ctx.beginPath(); ctx.arc(this.x,this.y,r*2,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=a*0.8; ctx.beginPath(); ctx.arc(this.x,this.y,r*0.5,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1; }
}

function spawnSpecial(text) {
  const t = text.toLowerCase();
  const eff = [];
  if (currentTheme==='star') {
    for(let i=0;i<25;i++) eff.push(new StarEffect());
    for(let i=0;i<3;i++) eff.push(new RippleEffect(Math.random()*W,Math.random()*H));
  }
  if (currentTheme==='lightning') {
    for(let i=0;i<5;i++) eff.push(new LightningBolt());
    for(let i=0;i<3;i++) eff.push(new PulseOrb());
  }
  if (currentTheme==='water') {
    for(let i=0;i<5;i++) eff.push(new RippleEffect(Math.random()*W,Math.random()*H));
  }
  if (currentTheme==='magic') {
    for(let i=0;i<4;i++) eff.push(new SpiralEffect());
    for(let i=0;i<8;i++) eff.push(new PulseOrb());
  }
  if (currentTheme==='circuit') {
    for(let i=0;i<8;i++) eff.push(new CircuitLine());
  }
  if (currentTheme==='tree') {
    const bx=Math.random()*W*0.6+W*0.2;
    eff.push(new FractalBranch(bx,H,-Math.PI/2,5,80));
    eff.push(new FractalBranch(bx,H,-Math.PI/2,4,60));
  }
  if (currentTheme==='fire') {
    eff.push(new ExplosionBurst());
    for(let i=0;i<3;i++) setTimeout(()=>specialEffects.push(new ExplosionBurst()),i*200);
  }
  if (currentTheme==='cloud') {
    for(let i=0;i<30;i++) eff.push(new RainDrop());
  }
  if (currentTheme==='spiral') {
    for(let i=0;i<3;i++) eff.push(new SpiralEffect());
  }
  if (currentTheme==='pulse') {
    for(let i=0;i<6;i++) eff.push(new PulseOrb());
    for(let i=0;i<2;i++) eff.push(new LightningBolt());
  }
  if (currentTheme==='default') {
    for(let i=0;i<6;i++) eff.push(new RippleEffect(Math.random()*W,Math.random()*H));
  }
  specialEffects.push(...eff);
}

// ── BACKGROUND RENDER ──
function renderBg() {
  // Subtle bg glow based on theme
  const grad = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.7);
  const col = themeData.palette[0];
  grad.addColorStop(0,'rgba(0,0,0,0)');
  grad.addColorStop(1,'rgba(0,0,0,0.4)');
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
}

// ── DRAW LOOP ──
function draw() {
  frameCount++;
  ctx.clearRect(0,0,W,H);
  // fill bg
  ctx.fillStyle = themeData.bg || '#05050a';
  ctx.fillRect(0,0,W,H);

  // spawn continuous particles
  if (particles.length < 150 && frameCount%3===0) spawnParticles(2);
  particles.forEach(p=>p.update());
  particles.forEach(p=>p.draw());

  // lightning flash
  if (currentTheme==='lightning' && Math.random()<0.006) specialEffects.push(new LightningBolt());
  if (currentTheme==='cloud' && Math.random()<0.04) specialEffects.push(new RainDrop());
  if (currentTheme==='star' && Math.random()<0.02) specialEffects.push(new StarEffect());
  if (currentTheme==='pulse' && frameCount%60===0) specialEffects.push(new PulseOrb());
  if (currentTheme==='circuit' && Math.random()<0.008) specialEffects.push(new CircuitLine());

  specialEffects = specialEffects.filter(e => { const alive=e.update(); e.draw(); return alive; });

  requestAnimationFrame(draw);
}
draw();

// ── ECHO SPAWN ──
function spawnEcho(word) {
  if (!word.trim()) return;
  const el = document.createElement('div');
  el.className = 'echo-word';
  const size = Math.random()*40+18;
  el.style.fontSize = size+'px';
  el.style.left = (Math.random()*70+5)+'%';
  el.style.top = (Math.random()*60+15)+'%';
  el.style.color = themeData.palette[Math.random()*themeData.palette.length|0];
  el.style.opacity = '0';
  el.style.fontWeight = Math.random()<0.4?'700':'400';
  el.style.animationDuration = (3+Math.random()*2)+'s';
  el.textContent = word;
  echoLayer.appendChild(el);
  setTimeout(()=>el.remove(), 6000);
}

function addWordStrip(word) {
  if (!word.trim() || word.length < 3) return;
  if (wordStrip.children.length > 14) wordStrip.removeChild(wordStrip.firstChild);
  const el = document.createElement('span');
  el.className = 'strip-word';
  el.textContent = word.toLowerCase();
  wordStrip.appendChild(el);
}

// ── INPUT HANDLING ──
let debounceTimer;
let lastTheme = 'default';

input.addEventListener('input', ()=>{
  const val = input.value;
  const words = val.trim().split(/\s+/);
  document.body.classList.toggle('active', val.length > 0);

  // Detect theme on input
  const detected = detectTheme(val);
  if (detected !== lastTheme) {
    lastTheme = detected;
    setTheme(detected);
  }

  // Echo individual words as typed
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(()=>{
    const last = words[words.length-1];
    if (last && last.length > 2) spawnEcho(last);
  }, 300);
});

input.addEventListener('keydown', e=>{
  if (e.key==='Enter') {
    const val = input.value.trim();
    if (!val) return;
    // Big echo burst
    const words = val.split(/\s+/).filter(w=>w.length>2);
    words.forEach((w,i)=>setTimeout(()=>spawnEcho(w),i*100));
    words.forEach(w=>addWordStrip(w));
    inputHistory.push(val);
    spawnSpecial(val);
    // Clear and pulse
    input.value = '';
    document.body.classList.remove('active');
    spawnParticles(30);
  }
  if (e.key==='Backspace' && input.value==='') {
    document.body.classList.remove('active');
  }
});

// Initialize
setTheme('default');
spawnParticles(60);
input.focus();
</script>
